<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Agent Boss — multi-agent AI coordination dashboard" />
    <title>Agent Boss - Mission Control</title>
  </head>
  <body class="dark">
    <script>
      // Initialize theme before Vue mounts to prevent flash
      (function() {
        var stored = localStorage.getItem('boss-theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        if (theme === 'light') document.body.classList.remove('dark');
      })();
    </script>
    <a href="#app" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:p-2 focus:bg-background focus:text-foreground focus:border">Skip to content</a>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
