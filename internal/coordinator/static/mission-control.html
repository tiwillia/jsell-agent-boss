<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Boss</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;--bg2:#111620;--bg3:#171d2a;--bg4:#1d2535;
  --border:#242d3d;--border2:#2e3a50;
  --text:#c8d1e0;--text2:#8892a6;--text3:#5c6578;
  --blue:#4d9eff;--blue2:#2d7ff9;--blue-bg:rgba(77,158,255,.08);
  --green:#3fb950;--green-bg:rgba(63,185,80,.1);
  --yellow:#d29922;--yellow-bg:rgba(210,153,34,.1);
  --red:#f85149;--red-bg:rgba(248,81,73,.1);
  --purple:#a371f7;--purple-bg:rgba(163,113,247,.1);
  --orange:#db6d28;--orange-bg:rgba(219,109,40,.1);
  --cyan:#39d2c0;--cyan-bg:rgba(57,210,192,.1);
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%;width:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}

header{
  background:rgba(17,22,32,.92);border-bottom:1px solid var(--border);
  padding:0 28px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0}
header h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px}
header h1 span{color:var(--blue);font-weight:400;margin-left:6px;font-size:14px}
.header-meta{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text2)}
.header-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}

.space-nav{display:flex;gap:0;padding:8px 0 0;overflow-x:auto}
.space-tab{
  padding:7px 16px 9px;font-size:12px;font-weight:500;color:var(--text3);
  border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;
  transition:color .15s,border-color .15s;text-decoration:none;
}
.space-tab:hover{color:var(--text)}
.space-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.space-tab .tab-count{
  font-size:10px;background:var(--bg3);color:var(--text3);
  padding:1px 6px;border-radius:8px;margin-left:6px;font-weight:600;
}
.space-tab.active .tab-count{background:var(--blue-bg);color:var(--blue)}

.sub-nav{display:flex;gap:0;padding:0 28px;background:var(--bg2);border-bottom:1px solid var(--border)}
.sub-tab{
  padding:8px 18px 10px;font-size:12px;font-weight:500;color:var(--text3);
  border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;
  transition:color .15s,border-color .15s;
}
.sub-tab:hover{color:var(--text)}
.sub-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);font-weight:600}

.page{padding:20px 28px 40px;width:100%}

.top-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.overview-table{width:100%;border-collapse:collapse;font-size:11px}
.overview-table th{text-align:left;padding:5px 8px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.overview-table td{padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text2)}
.overview-table tr:hover td{background:var(--bg3)}
.overview-table .ov-name{color:#fff;font-weight:600}
.overview-table .ov-branch{font-family:monospace;color:var(--cyan);font-size:10px}
.overview-table .ov-pr{color:var(--blue);font-weight:600;font-size:10px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{
  padding:12px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2)}
.card-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.card-body{padding:14px 16px}

.mid-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}

.broadcast-card{border-color:var(--cyan);border-width:1px}
.broadcast-card .card-header{background:var(--cyan-bg);border-bottom-color:rgba(57,210,192,.2)}
.broadcast-card .card-title{color:var(--cyan)}

.tmux-table{width:100%;border-collapse:collapse;font-size:11px}
.tmux-table th{text-align:left;padding:5px 8px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.tmux-table td{padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px}
.tmux-table tr:hover td{background:var(--bg3)}

.tmux-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.tmux-dot-idle{background:var(--green)}
.tmux-dot-busy{background:var(--yellow)}
.tmux-dot-offline{background:var(--text3)}
.tmux-dot-unreg{background:var(--border2)}
.tmux-dot-waiting{background:var(--red);animation:pulse-glow 1.5s ease-in-out infinite}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot-active{background:var(--green)}
.status-dot-done{background:var(--blue)}
.status-dot-blocked{background:var(--red)}
.status-dot-stale{background:var(--orange)}
.status-dot-idle{background:var(--text3)}
.status-dot-error{background:var(--red)}
.status-dot-waiting{background:var(--red);animation:pulse-glow 1.5s ease-in-out infinite}

.btn{
  padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:var(--bg4);border-color:var(--blue)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue-bg);border-color:rgba(77,158,255,.3);color:var(--blue)}
.btn-primary:hover{background:rgba(77,158,255,.15);border-color:var(--blue)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:3px 8px;font-size:10px;border-radius:4px}
.btn-agent-poke{
  background:rgba(57,210,192,.06);border-color:rgba(57,210,192,.2);color:var(--cyan);
  padding:3px 8px;font-size:10px;border-radius:4px;
}
.btn-agent-poke:hover{background:rgba(57,210,192,.15);border-color:var(--cyan)}

.broadcast-log{
  max-height:140px;overflow-y:auto;font-family:"SF Mono",SFMono-Regular,Menlo,monospace;
  font-size:11px;color:var(--text3);line-height:1.6;margin-top:10px;padding:8px;
  background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);
}
.broadcast-log::-webkit-scrollbar{width:4px}
.broadcast-log::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.broadcast-log .log-ok{color:var(--green)}
.broadcast-log .log-skip{color:var(--yellow)}
.broadcast-log .log-err{color:var(--red)}
.broadcast-log .log-info{color:var(--blue)}

.protocol-card{border-color:var(--purple);border-width:1px}
.protocol-card .card-header{background:var(--purple-bg);border-bottom-color:rgba(163,113,247,.2)}
.protocol-card .card-title{color:var(--purple)}
.protocol-body{max-height:300px;overflow-y:auto;font-size:12px;color:var(--text2);line-height:1.6}
.protocol-body::-webkit-scrollbar{width:4px}
.protocol-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.boss-inbox{border-color:var(--yellow);border-width:1px}
.boss-inbox .card-header{background:var(--yellow-bg);border-bottom-color:rgba(210,153,34,.2)}
.boss-inbox .card-title{color:var(--yellow)}
.inbox-item{
  padding:8px 12px;border-bottom:1px solid var(--border);display:flex;
  align-items:flex-start;gap:10px;font-size:12px;
}
.inbox-item:last-child{border-bottom:none}
.inbox-agent{
  min-width:44px;font-weight:700;font-size:10px;padding:2px 0;
  text-align:center;border-radius:4px;flex-shrink:0;color:var(--yellow);
  background:rgba(210,153,34,.08);
}
.inbox-text{color:var(--text2);line-height:1.5}

.blocker-item{
  padding:8px 12px;border-bottom:1px solid var(--border);display:flex;
  align-items:flex-start;gap:10px;font-size:12px;
}
.blocker-item:last-child{border-bottom:none}
.blocker-agent{
  min-width:44px;font-weight:700;font-size:10px;padding:2px 0;
  text-align:center;border-radius:4px;flex-shrink:0;color:var(--red);
  background:rgba(248,81,73,.08);
}
.blocker-text{color:var(--text2);line-height:1.5}

.event-log-card .card-body{padding:0}
.event-log{
  max-height:500px;overflow-y:auto;font-family:"SF Mono",SFMono-Regular,Menlo,monospace;
  font-size:10px;color:var(--text3);line-height:1.5;padding:10px 14px;
}
.event-log::-webkit-scrollbar{width:4px}
.event-log::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.event-entry{padding:1px 0;border-bottom:1px solid rgba(36,45,61,.5)}
.event-time{color:var(--text3);margin-right:8px}
.event-msg{color:var(--text2)}

.section-label{
  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text3);margin:24px 0 10px;padding-bottom:6px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;
}
.section-count{
  font-size:10px;background:var(--bg3);color:var(--text2);
  padding:1px 7px;border-radius:8px;font-weight:600;
}

.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-top:4px}
.agent-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color .15s;max-height:640px;display:flex;flex-direction:column;
}
.agent-card:hover{border-color:var(--blue)}
.agent-card.has-blocker{border-color:var(--red)}
.agent-card.has-question{border-color:var(--yellow)}
.agent-head{
  padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.agent-name{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.agent-badges{display:flex;align-items:center;gap:6px}
.agent-status{
  font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;
}
.status-active{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.25)}
.status-blocked{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.25)}
.status-done{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(77,158,255,.25)}
.status-idle{background:rgba(92,101,120,.15);color:var(--text3);border:1px solid rgba(92,101,120,.2)}
.status-error{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.25)}

.tmux-badge{
  font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;
}
.tmux-idle{background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.2)}
.tmux-busy{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(210,153,34,.2)}
.tmux-offline{background:rgba(92,101,120,.1);color:var(--text3);border:1px solid rgba(92,101,120,.15)}

.agent-summary{
  padding:10px 16px;font-size:13px;font-weight:500;color:var(--text);
  background:var(--bg3);border-bottom:1px solid var(--border);line-height:1.5;flex-shrink:0;
}
.agent-body{padding:12px 16px 14px;overflow-y:auto;flex:1;min-height:0}
.agent-body::-webkit-scrollbar{width:4px}
.agent-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.agent-meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.agent-phase{
  display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;padding:2px 8px;border-radius:4px;
  background:var(--purple-bg);color:var(--purple);border:1px solid rgba(163,113,247,.2);
}
.agent-branch{
  display:inline-block;font-size:10px;font-weight:600;
  letter-spacing:.3px;padding:2px 8px;border-radius:4px;
  background:var(--cyan-bg);color:var(--cyan);border:1px solid rgba(57,210,192,.2);
  font-family:monospace;
}
.agent-test-count{
  display:inline-block;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:4px;
  background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.2);
}
.agent-items{list-style:none;padding:0}
.agent-items li{
  font-size:12px;color:var(--text2);padding:3px 0;padding-left:14px;
  position:relative;line-height:1.5;
}
.agent-items li::before{
  content:"";position:absolute;left:0;top:10px;
  width:5px;height:5px;border-radius:50%;background:var(--border2);
}
.agent-next{
  margin-top:10px;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);
  font-size:11px;color:var(--text2);border:1px solid var(--border);line-height:1.5;
}
.agent-next strong{color:var(--cyan);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.agent-updated{font-size:10px;color:var(--text3);margin-top:8px;text-align:right}

.boss-q{
  background:var(--yellow-bg);border:1px solid rgba(210,153,34,.2);
  border-radius:var(--radius-sm);padding:8px 12px;margin-top:8px;font-size:12px;
  color:var(--yellow);line-height:1.5;
}
.boss-q::before{content:"? BOSS";font-weight:700;font-size:10px;letter-spacing:.5px;display:block;margin-bottom:2px;opacity:.7}

.agent-blocker{
  background:var(--red-bg);border:1px solid rgba(248,81,73,.15);
  border-radius:var(--radius-sm);padding:8px 12px;margin-top:8px;font-size:12px;
  color:var(--red);line-height:1.5;
}
.agent-blocker::before{content:"BLOCKER";font-weight:700;font-size:10px;letter-spacing:.5px;display:block;margin-bottom:2px;opacity:.7}

.agent-free-text{font-size:12px;color:var(--text2);line-height:1.6;margin-top:6px;max-height:400px;overflow-y:auto;padding-right:4px}
.agent-free-text::-webkit-scrollbar{width:4px}
.agent-free-text::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.free-heading{font-weight:700;color:var(--text);margin:8px 0 4px}
.free-h1,.free-h2{font-size:13px;border-bottom:1px solid var(--border);padding-bottom:4px}
.free-h3{font-size:12px;color:var(--cyan)}
.free-h4{font-size:11px;color:var(--text2)}
.free-para{margin:3px 0;line-height:1.6}
.free-para strong,.agent-free-text li strong{color:var(--text);font-weight:600}
.free-code{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:"SF Mono",SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--text3);overflow-x:auto;margin:6px 0;line-height:1.5}
.free-inline-code{background:var(--bg);padding:1px 4px;border-radius:3px;font-family:"SF Mono",SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--cyan)}
.free-table{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0}
.free-table td{padding:3px 8px;border:1px solid var(--border);color:var(--text2)}
.free-table tr:first-child td{font-weight:600;color:var(--text);background:var(--bg3)}
.free-table td strong{color:var(--text)}

.agent-section{margin-top:8px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm)}
.agent-section-title{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}

.archive-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0;margin-top:20px}
.archive-header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
}
.archive-header:hover{background:var(--bg3)}
.archive-body{padding:16px;display:none;font-size:12px;color:var(--text2);line-height:1.7}
.archive-body.open{display:block}

.empty-state{text-align:center;padding:80px 28px;color:var(--text3)}
.empty-state h2{color:var(--text2);font-size:18px;margin-bottom:8px}
.empty-state p{font-size:13px;max-width:420px;margin:0 auto}

.pulse{animation:pulse-glow 2s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{opacity:1}50%{opacity:.5}}

.stats-row{display:flex;gap:12px;margin-bottom:6px}
.stat-chip{
  font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;
  display:inline-flex;align-items:center;gap:4px;
}

.agent-actions{display:flex;align-items:center;gap:6px;margin-top:8px}
.ov-poke{width:20px;text-align:center;padding:2px !important}
.btn-ov-poke{
  background:none;border:1px solid rgba(57,210,192,.2);color:var(--cyan);
  width:20px;height:20px;border-radius:4px;cursor:pointer;font-size:11px;
  display:inline-flex;align-items:center;justify-content:center;padding:0;
  transition:all .15s;line-height:1;
}
.btn-ov-poke:hover{background:rgba(57,210,192,.12);border-color:var(--cyan)}
.btn-ov-poke:disabled{opacity:.4;cursor:not-allowed}
.btn-ov-poke.ov-poke-err{border-color:rgba(248,81,73,.3);color:var(--red)}
.btn-ov-poke.ov-poke-err:hover{background:rgba(248,81,73,.12);border-color:var(--red)}
.overview-table tr.needs-approval td{background:rgba(248,81,73,.06);cursor:pointer}
.overview-table tr.needs-approval:hover td{background:rgba(248,81,73,.12)}
.tmux-badge.tmux-waiting{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.2);animation:pulse-glow 1.5s ease-in-out infinite}
.approval-popup{
  position:fixed;z-index:200;background:var(--bg2);border:1px solid var(--red);
  border-radius:var(--radius);padding:0;min-width:360px;max-width:500px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:auto;
}
.approval-popup-header{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(248,81,73,.06);border-radius:var(--radius) var(--radius) 0 0;
}
.approval-popup-header .ap-agent{font-size:13px;font-weight:700;color:#fff}
.approval-popup-header .ap-tool{font-size:10px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.4px}
.approval-popup-body{
  padding:12px 14px;font-family:"SF Mono",SFMono-Regular,Menlo,monospace;
  font-size:11px;color:var(--text2);line-height:1.6;max-height:200px;overflow-y:auto;
  white-space:pre-wrap;word-break:break-word;
}
.approval-popup-footer{
  padding:10px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:flex-end;gap:8px;
}
.btn-approve-confirm{
  padding:5px 16px;border-radius:var(--radius-sm);border:1px solid rgba(248,81,73,.4);
  background:rgba(248,81,73,.1);color:var(--red);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.btn-approve-confirm:hover{background:rgba(248,81,73,.2);border-color:var(--red)}
.btn-approve-confirm:disabled{opacity:.4;cursor:not-allowed}
.btn-approve-dismiss{
  padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);
  background:var(--bg3);color:var(--text3);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;
}
.btn-approve-dismiss:hover{background:var(--bg4);color:var(--text)}

.overview-table tr.is-done td{opacity:.45}
.overview-table tr.is-done:hover td{opacity:.7}
.agent-card.is-done{opacity:.5;border-color:var(--border)}
.agent-card.is-done:hover{opacity:.75;border-color:var(--text3)}
.status-stale{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(219,109,40,.25)}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>Mission Control</h1>
    <div class="header-meta">
      <span id="agent-count"></span>
      <span id="last-update"></span>
    </div>
  </div>
  <nav class="space-nav" id="space-nav"></nav>
</header>

<div id="sub-nav-container"></div>

<div class="page" id="page">
  <div style="text-align:center;padding:80px 0;color:var(--text3)">Loading...</div>
</div>

<script>
var SPACE = null;
var evtSource = null;
var broadcastLog = [];
var tmuxCache = null;
var currentView = 'board';
var approvalPollTimer = null;

(function(){
  var pathMatch = window.location.pathname.match(/^\/spaces\/([^\/]+)/);
  SPACE = pathMatch ? decodeURIComponent(pathMatch[1]) : null;
  var hashView = window.location.hash.replace('#','');
  if (hashView === 'console') currentView = 'console';
  loadSpaceNav();
})();

function loadSpaceNav(){
  fetch('/spaces')
    .then(function(r){ return r.json(); })
    .then(function(spaces){
      spaces.sort(function(a,b){ return a.name.localeCompare(b.name); });
      var nav = document.getElementById('space-nav');
      var h = '';
      spaces.forEach(function(s){
        var cls = (s.name === SPACE) ? 'space-tab active' : 'space-tab';
        h += '<a class="' + cls + '" href="/spaces/' + encodeURIComponent(s.name) + '/">';
        h += esc(s.name);
        h += '<span class="tab-count">' + s.agent_count + '</span>';
        h += '</a>';
      });
      nav.innerHTML = h;

      if (SPACE) {
        renderSubNav();
        loadSpace(SPACE);
      } else {
        document.getElementById('sub-nav-container').innerHTML = '';
        renderSpaceList(spaces);
      }
    });
}

function renderSubNav(){
  document.getElementById('sub-nav-container').innerHTML = '';
}

function renderSpaceList(spaces){
  document.title = 'Mission Control';
  var o = '';
  if (spaces.length === 0){
    o += '<div class="empty-state"><h2>No spaces yet</h2>';
    o += '<p>POST to /spaces/{name}/agent/{agent} to create one.</p></div>';
  } else {
    o += '<div class="section-label">Spaces<span class="section-count">' + spaces.length + '</span></div>';
    o += '<div class="agent-grid">';
    spaces.forEach(function(s){
      o += '<a href="/spaces/' + encodeURIComponent(s.name) + '/" style="text-decoration:none">';
      o += '<div class="agent-card">';
      o += '<div class="agent-head">';
      o += '<span class="agent-name">' + esc(s.name) + '</span>';
      o += '<span class="agent-status status-active">' + s.agent_count + ' agents</span>';
      o += '</div>';
      o += '<div class="agent-summary">Updated ' + new Date(s.updated_at).toLocaleString() + '</div>';
      o += '</div></a>';
    });
    o += '</div>';
  }
  document.getElementById('page').innerHTML = o;
  document.getElementById('agent-count').innerHTML = '';
  document.getElementById('last-update').textContent = '';
}

function loadSpace(name){
  document.title = 'Mission Control \u2014 ' + name;

  var base = '/spaces/' + encodeURIComponent(name);
  Promise.all([
    fetch(base + '/', {headers:{'Accept':'application/json'}, cache:'no-store'}).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
    fetch(base + '/api/tmux-status').then(function(r){ return r.json(); }).catch(function(){ return []; }),
    fetch(base + '/api/events').then(function(r){ return r.json(); }).catch(function(){ return []; })
  ]).then(function(results){
    tmuxCache = results[1];
    renderBoard(results[0], results[1], results[2]);
    startApprovalPolling();
  }).catch(function(e){
    document.getElementById('page').innerHTML =
      '<div style="text-align:center;padding:80px 0;color:var(--red)">Failed to load ' + esc(name) + ': ' + esc(e.message) + '</div>';
  });

  if (evtSource) evtSource.close();
  evtSource = new EventSource('/spaces/' + encodeURIComponent(name) + '/events');
  evtSource.addEventListener('agent_updated', function(){ loadSpace(SPACE); });
  evtSource.addEventListener('agent_removed', function(){ loadSpace(SPACE); });
  evtSource.addEventListener('broadcast_progress', function(e){
    try {
      var p = JSON.parse(e.data);
      var ts = new Date().toLocaleTimeString();
      broadcastLog.push({time:ts, cls:'log-info', msg:p.message});
      renderBroadcastLog();
    } catch(ex){}
  });
  evtSource.addEventListener('broadcast_complete', function(e){
    try {
      var result = JSON.parse(e.data);
      var ts = new Date().toLocaleTimeString();
      if (result.sent && result.sent.length > 0)
        broadcastLog.push({time:ts, cls:'log-ok', msg:'Sent to: ' + result.sent.join(', ')});
      if (result.skipped && result.skipped.length > 0)
        broadcastLog.push({time:ts, cls:'log-skip', msg:'Skipped: ' + result.skipped.join(', ')});
      if (result.errors && result.errors.length > 0)
        result.errors.forEach(function(err){ broadcastLog.push({time:ts, cls:'log-err', msg:err}); });
      if ((!result.sent || result.sent.length===0) && (!result.skipped || result.skipped.length===0) && (!result.errors || result.errors.length===0))
        broadcastLog.push({time:ts, cls:'log-info', msg:'No targets found'});
      renderBroadcastLog();
    } catch(ex){}
    document.querySelectorAll('.btn-agent-poke').forEach(function(b){ b.disabled = false; b.textContent = 'Check In'; });
    document.querySelectorAll('.btn-ov-poke').forEach(function(b){
      b.disabled = false; b.innerHTML = '&#x21bb;';
      var ag = b.getAttribute('data-agent');
      var isErr = false;
      if (result.errors) result.errors.forEach(function(e){ if (e.indexOf(ag) !== -1) isErr = true; });
      if (result.skipped) result.skipped.forEach(function(e){ if (e.indexOf(ag) !== -1) isErr = true; });
      if (isErr) b.classList.add('ov-poke-err'); else b.classList.remove('ov-poke-err');
    });
    var btn = document.getElementById('broadcast-btn');
    if (btn){ btn.disabled = false; btn.textContent = 'Broadcast All'; }
    loadSpace(SPACE);
  });
}

function triggerBroadcast(){
  var btn = document.getElementById('broadcast-btn');
  if (btn){ btn.disabled = true; btn.textContent = 'Broadcasting...'; }
  broadcastLog.push({time: new Date().toLocaleTimeString(), cls:'log-info', msg:'Broadcast initiated...'});
  renderBroadcastLog();
  fetch('/spaces/' + encodeURIComponent(SPACE) + '/broadcast', {method:'POST'}).catch(function(e){
    broadcastLog.push({time: new Date().toLocaleTimeString(), cls:'log-err', msg:'Failed: ' + e.message});
    renderBroadcastLog();
    if (btn){ btn.disabled = false; btn.textContent = 'Broadcast All'; }
  });
}

function pokeAgent(agentName, btnEl){
  if (btnEl){ btnEl.disabled = true; btnEl.textContent = '...'; }
  broadcastLog.push({time: new Date().toLocaleTimeString(), cls:'log-info', msg:'Poking ' + agentName + '...'});
  renderBroadcastLog();
  fetch('/spaces/' + encodeURIComponent(SPACE) + '/broadcast/' + encodeURIComponent(agentName), {method:'POST'}).catch(function(e){
    broadcastLog.push({time: new Date().toLocaleTimeString(), cls:'log-err', msg:agentName + ' poke failed: ' + e.message});
    renderBroadcastLog();
    if (btnEl){ btnEl.disabled = false; btnEl.textContent = 'Check In'; }
  });
}

function approveAgent(agentName, btnEl){
  if (btnEl){ btnEl.disabled = true; btnEl.textContent = '...'; }
  broadcastLog.push({time: new Date().toLocaleTimeString(), cls:'log-info', msg:'Approving ' + agentName + '...'});
  renderBroadcastLog();
  fetch('/spaces/' + encodeURIComponent(SPACE) + '/approve/' + encodeURIComponent(agentName), {method:'POST'})
    .then(function(r){
      if (!r.ok) return r.text().then(function(t){ throw new Error(t); });
      return r.json();
    })
    .then(function(data){
      broadcastLog.push({time: new Date().toLocaleTimeString(), cls:'log-ok', msg:agentName + ' approved (' + (data.tool || '') + ')'});
      renderBroadcastLog();
      if (btnEl){ btnEl.disabled = false; btnEl.textContent = 'Approve'; }
      setTimeout(function(){ refreshTmux(); }, 1000);
    })
    .catch(function(e){
      broadcastLog.push({time: new Date().toLocaleTimeString(), cls:'log-err', msg:agentName + ' approve failed: ' + e.message});
      renderBroadcastLog();
      if (btnEl){ btnEl.disabled = false; btnEl.textContent = 'Approve'; }
    });
}

function startApprovalPolling(){
  if (approvalPollTimer) clearInterval(approvalPollTimer);
  approvalPollTimer = setInterval(function(){
    if (!SPACE) return;
    fetch('/spaces/' + encodeURIComponent(SPACE) + '/api/tmux-status')
      .then(function(r){ return r.json(); })
      .then(function(data){
        var changed = false;
        if (tmuxCache) {
          for (var i = 0; i < data.length; i++){
            var old = null;
            for (var j = 0; j < tmuxCache.length; j++){
              if (tmuxCache[j].agent === data[i].agent){ old = tmuxCache[j]; break; }
            }
            if (!old || old.needs_approval !== data[i].needs_approval) changed = true;
          }
        } else { changed = true; }
        tmuxCache = data;
        if (changed) updateApprovalUI(data);
      }).catch(function(){});
  }, 2000);
}

function showApprovalPopup(event, agentName){
  dismissApprovalPopup();
  var tmux = null;
  if (tmuxCache) for (var i = 0; i < tmuxCache.length; i++){ if (tmuxCache[i].agent === agentName){ tmux = tmuxCache[i]; break; } }
  if (!tmux || !tmux.needs_approval) return;
  var popup = document.createElement('div');
  popup.className = 'approval-popup';
  popup.id = 'approval-popup';
  var promptLines = (tmux.prompt_text || 'Approve tool use').replace(/ \| /g, '\n');
  popup.innerHTML = '<div class="approval-popup-header"><span class="ap-agent">' + esc(agentName) + '</span><span class="ap-tool">' + esc(tmux.tool_name || 'tool') + '</span></div>'
    + '<div class="approval-popup-body">' + esc(promptLines) + '</div>'
    + '<div class="approval-popup-footer"><button class="btn-approve-dismiss" onclick="dismissApprovalPopup()">Cancel</button><button class="btn-approve-confirm" id="ap-confirm-btn" onclick="confirmApproval(\'' + esc(agentName).replace(/'/g,"\\'") + '\')">Approve</button></div>';
  document.body.appendChild(popup);
  var rect = event.currentTarget.getBoundingClientRect();
  var popupW = 400;
  var left = Math.min(rect.left, window.innerWidth - popupW - 20);
  var top = rect.bottom + 4;
  if (top + 280 > window.innerHeight) top = rect.top - 280;
  popup.style.left = Math.max(10, left) + 'px';
  popup.style.top = Math.max(10, top) + 'px';
  setTimeout(function(){ document.addEventListener('click', dismissOnOutsideClick); }, 0);
}

function dismissApprovalPopup(){
  var el = document.getElementById('approval-popup');
  if (el) el.remove();
  document.removeEventListener('click', dismissOnOutsideClick);
}

function dismissOnOutsideClick(e){
  var popup = document.getElementById('approval-popup');
  if (popup && !popup.contains(e.target)) dismissApprovalPopup();
}

function confirmApproval(agentName){
  var btn = document.getElementById('ap-confirm-btn');
  if (btn){ btn.disabled = true; btn.textContent = '...'; }
  approveAgent(agentName, null);
  setTimeout(dismissApprovalPopup, 500);
}

function updateApprovalUI(tmuxData){
  if (!tmuxData) return;
  tmuxData.forEach(function(t){
    var row = document.querySelector('tr .status-dot[data-agent="' + t.agent + '"]');
    if (!row) return;
    var tr = row.closest('tr');
    if (!tr) return;
    if (t.needs_approval){
      tr.className = 'needs-approval';
      tr.onclick = function(e){ showApprovalPopup(e, t.agent); };
      tr.style.cursor = 'pointer';
      row.className = 'status-dot status-dot-waiting';
    } else {
      if (tr.className === 'needs-approval'){
        tr.className = '';
        tr.onclick = null;
        tr.style.cursor = '';
      }
    }
  });
}

function refreshTmux(){
  fetch('/spaces/' + encodeURIComponent(SPACE) + '/api/tmux-status')
    .then(function(r){ return r.json(); })
    .then(function(data){
      tmuxCache = data;
      renderTmuxTable(data);
    }).catch(function(){});
}

function renderBroadcastLog(){
  var el = document.getElementById('broadcast-log');
  if (!el) return;
  var h = '';
  var recent = broadcastLog.slice(-30);
  recent.forEach(function(entry){
    h += '<div class="' + entry.cls + '">[' + esc(entry.time) + '] ' + esc(entry.msg) + '</div>';
  });
  el.innerHTML = h;
  el.scrollTop = el.scrollHeight;
}

function renderTmuxTable(tmuxData){
  var el = document.getElementById('tmux-table-body');
  if (!el) return;
  var h = '';
  if (!tmuxData || tmuxData.length === 0){
    h = '<tr><td colspan="5" style="text-align:center;color:var(--text3);font-style:italic">No agents</td></tr>';
  } else {
    tmuxData.sort(function(a,b){ return a.agent.localeCompare(b.agent); });
    tmuxData.forEach(function(t){
      var dotCls, stLabel;
      if (!t.registered){ dotCls='tmux-dot-unreg'; stLabel='unregistered'; }
      else if (!t.exists){ dotCls='tmux-dot-offline'; stLabel='offline'; }
      else if (t.idle){ dotCls='tmux-dot-idle'; stLabel='idle'; }
      else { dotCls='tmux-dot-busy'; stLabel='busy'; }
      var pokeCls = 'btn-ov-poke' + (t.registered && t.exists ? '' : ' ov-poke-err');
      h += '<tr>';
      h += '<td class="ov-poke"><button class="' + pokeCls + '" data-agent="' + esc(t.agent) + '" onclick="pokeAgent(\'' + esc(t.agent).replace(/'/g,"\\'") + '\', this)" title="Check in ' + esc(t.agent) + '">&#x21bb;</button></td>';
      h += '<td style="color:#fff;font-weight:600">' + esc(t.agent) + '</td>';
      h += '<td><span class="tmux-dot ' + dotCls + '"></span>' + stLabel + '</td>';
      h += '<td style="font-family:monospace;font-size:10px;color:var(--cyan)">' + esc(t.session || '\u2014') + '</td>';
      h += '<td style="font-size:10px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(t.last_line || '') + '">' + esc(t.last_line || '\u2014') + '</td>';
      h += '</tr>';
    });
  }
  el.innerHTML = h;
}

function timeAgo(iso){
  var d = new Date(iso), s = Math.floor((Date.now() - d) / 1000);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function esc(s){
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function buildMergeRequestUrl(repoUrl, pr){
  if (!repoUrl || !pr) return '';
  var num = pr.replace(/^#/, '');
  if (!/^\d+$/.test(num)) return '';
  var base = repoUrl.replace(/\/+$/, '');
  return base + '/-/merge_requests/' + num;
}

function extractBossQuestions(a){
  var qs = [];
  var all = (a.summary||'') + ' ' + (a.free_text||'') + ' ' + (a.next_steps||'');
  (a.items||[]).forEach(function(it){ all += ' ' + it; });
  if (a.questions) qs = qs.concat(a.questions);
  var re = /\[\?BOSS\][^\n]*/g, m;
  while ((m = re.exec(all)) !== null){
    var q = m[0].replace(/^\[\?BOSS\]\s*/, '');
    if (qs.indexOf(q) === -1) qs.push(q);
  }
  return qs;
}

function getTmuxStatus(agentName, tmuxData){
  if (!tmuxData) return null;
  for (var i = 0; i < tmuxData.length; i++){
    if (tmuxData[i].agent === agentName) return tmuxData[i];
  }
  return null;
}

function renderConsole(data, tmuxData, eventLog){
  var o = '';

  o += '<div class="mid-row">';

  o += '<div class="card broadcast-card">';
  o += '<div class="card-header"><span class="card-title">Broadcast Console</span>';
  o += '<div style="display:flex;gap:8px">';
  o += '<button class="btn" onclick="refreshTmux()" title="Refresh tmux status">Refresh</button>';
  o += '<button class="btn btn-primary" id="broadcast-btn" onclick="triggerBroadcast()">Broadcast All</button>';
  o += '</div></div>';
  o += '<div class="card-body" style="padding:10px 14px">';
  o += '<table class="tmux-table"><thead><tr><th style="width:20px"></th><th>Agent</th><th>Status</th><th>Session</th><th>Last Output</th></tr></thead>';
  o += '<tbody id="tmux-table-body"></tbody></table>';
  o += '<div class="broadcast-log" id="broadcast-log" style="max-height:300px"></div>';
  o += '</div></div>';

  o += '<div class="card event-log-card">';
  o += '<div class="card-header"><span class="card-title">Event Log</span>';
  o += '<span class="card-badge" style="background:var(--bg3);color:var(--text3);border:1px solid var(--border)">' + (eventLog ? eventLog.length : 0) + '</span>';
  o += '</div>';
  o += '<div class="event-log" id="event-log" style="max-height:500px">';
  if (eventLog && eventLog.length > 0){
    eventLog.slice(-100).forEach(function(entry){
      var m = entry.match(/^\[([^\]]+)\]\s*(.*)/);
      if (m){
        o += '<div class="event-entry"><span class="event-time">' + esc(m[1]) + '</span><span class="event-msg">' + esc(m[2]) + '</span></div>';
      } else {
        o += '<div class="event-entry"><span class="event-msg">' + esc(entry) + '</span></div>';
      }
    });
  } else {
    o += '<div style="color:var(--text3);font-style:italic;text-align:center;padding:20px 0">No events yet</div>';
  }
  o += '</div></div>';
  o += '</div>';

  document.getElementById('page').innerHTML = o;
  renderTmuxTable(tmuxData);
  renderBroadcastLog();

  var agents = data.agents || {};
  var names = Object.keys(agents);
  var dot = '<span class="header-dot" style="background:var(--green)"></span>';
  document.getElementById('agent-count').innerHTML = dot + names.length + ' agents';
  document.getElementById('last-update').textContent = 'Updated ' + new Date(data.updated_at).toLocaleString();

  var logEl = document.getElementById('event-log');
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

function renderBoard(data, tmuxData, eventLog){
  var agents = data.agents || {};
  var names = Object.keys(agents).sort();

  var roleOrder = ['Overlord','API','BE','FE','CP','Cluster','SDK','Cli','Trex','Helper','Reviewer'];
  var sorted = roleOrder.filter(function(n){ return agents[n]; });
  names.forEach(function(n){ if (sorted.indexOf(n) === -1) sorted.push(n); });

  var allQuestions = [];
  var allBlockers = [];
  var statusCounts = {active:0,blocked:0,done:0,idle:0,error:0};
  sorted.forEach(function(name){
    var a = agents[name];
    var st = a.status || 'idle';
    if (statusCounts[st] !== undefined) statusCounts[st]++;
    extractBossQuestions(a).forEach(function(q){ allQuestions.push({agent:name, text:q}); });
    (a.blockers||[]).forEach(function(b){ allBlockers.push({agent:name, text:b}); });
  });

  var o = '';


  o += '<div class="top-row">';

  o += '<div class="card">';
  o += '<div class="card-header"><span class="card-title">Project Overview</span>';
  o += '<div style="display:flex;gap:8px">';
  o += '<button class="btn" onclick="refreshTmux()" title="Refresh tmux status">Refresh</button>';
  o += '<button class="btn btn-primary" id="broadcast-btn" onclick="triggerBroadcast()">Broadcast All</button>';
  o += '</div></div>';
  o += '<div class="card-body" style="padding:8px 12px">';
  o += '<table class="overview-table"><thead><tr><th class="ov-poke"></th><th>Agent</th><th>Status</th><th>Branch</th><th>Session</th><th>PR</th></tr></thead><tbody>';
  sorted.forEach(function(name){
    var a = agents[name];
    var tmux = getTmuxStatus(name, tmuxData);
    var dotCls, stLabel;
    if (!tmux || !tmux.registered){ dotCls='tmux-dot-unreg'; stLabel='unregistered'; }
    else if (!tmux.exists){ dotCls='tmux-dot-offline'; stLabel='offline'; }
    else if (tmux.idle){ dotCls='tmux-dot-idle'; stLabel='idle'; }
    else { dotCls='tmux-dot-busy'; stLabel='busy'; }
    var isDone = (a.status === 'done');
    var isStale = !isDone && a.updated_at && (Date.now() - new Date(a.updated_at).getTime() > 600000);
    var hasBlockerOv = a.blockers && a.blockers.length > 0;
    var needsApproval = tmux && tmux.needs_approval;
    var trCls = '';
    if (needsApproval) trCls = ' class="needs-approval"';
    else if (isDone) trCls = ' class="is-done"';
    var trExtra = needsApproval ? ' onclick="showApprovalPopup(event, \'' + esc(name).replace(/'/g,"\\'") + '\')"' : '';
    o += '<tr' + trCls + trExtra + '>';
    var pokeOk = tmux && tmux.registered && tmux.exists;
    var pokeCls = 'btn-ov-poke' + (pokeOk ? '' : ' ov-poke-err');
    o += '<td class="ov-poke" style="white-space:nowrap">';
    o += '<button class="' + pokeCls + '" data-agent="' + esc(name) + '" onclick="event.stopPropagation();pokeAgent(\'' + esc(name).replace(/'/g,"\\'") + '\', this)" title="Check in ' + esc(name) + '">&#x21bb;</button>';
    o += '</td>';
    o += '<td class="ov-name">' + esc(name) + '</td>';
    var ovStatus = a.status || 'idle';
    var dotKey = ovStatus;
    if (needsApproval) dotKey = 'waiting';
    else if (isStale) dotKey = 'stale';
    else if (hasBlockerOv) dotKey = 'blocked';
    var ovLabel = needsApproval ? 'waiting' : (isStale ? 'stale' : (hasBlockerOv ? 'blocked' : ovStatus));
    o += '<td><span class="status-dot status-dot-' + dotKey + '" data-agent="' + esc(name) + '"></span>' + ovLabel;
    if (needsApproval && tmux.tool_name) o += ' <span style="font-size:9px;color:var(--text3)">(' + esc(tmux.tool_name) + ')</span>';
    o += '</td>';
    o += '<td class="ov-branch">' + esc(a.branch || '\u2014') + '</td>';
    o += '<td style="font-family:monospace;font-size:10px;color:var(--cyan)">' + esc(tmux && tmux.session ? tmux.session : '\u2014') + '</td>';
    var prVal = a.pr || '\u2014';
    var prUrl = buildMergeRequestUrl(a.repo_url, a.pr);
    o += '<td class="ov-pr">' + (prUrl ? '<a href="' + esc(prUrl) + '" style="color:var(--blue);text-decoration:none" target="_blank">' + esc(prVal) + '</a>' : esc(prVal)) + '</td>';
    o += '</tr>';
  });
  o += '</tbody></table>';
  o += '<div class="broadcast-log" id="broadcast-log"></div>';
  o += '</div></div>';

  if (allQuestions.length > 0 || allBlockers.length > 0) {
    o += '<div class="card boss-inbox">';
    o += '<div class="card-header"><span class="card-title">Inbox</span>';
    var inboxCount = allQuestions.length + allBlockers.length;
    o += '<span class="card-badge" style="background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(210,153,34,.2)">' + inboxCount + '</span>';
    o += '</div>';
    o += '<div class="card-body" style="padding:0;max-height:260px;overflow-y:auto">';
    allBlockers.forEach(function(b){
      o += '<div class="blocker-item">';
      o += '<span class="blocker-agent">' + esc(b.agent) + '</span>';
      o += '<span class="blocker-text" style="color:var(--red)">' + esc(b.text) + '</span>';
      o += '</div>';
    });
    allQuestions.forEach(function(q){
      o += '<div class="inbox-item">';
      o += '<span class="inbox-agent">' + esc(q.agent) + '</span>';
      o += '<span class="inbox-text">' + esc(q.text) + '</span>';
      o += '</div>';
    });
    o += '</div></div>';
  } else {
    o += '<div class="card">';
    o += '<div class="card-header"><span class="card-title">Inbox</span></div>';
    o += '<div class="card-body"><div style="color:var(--text3);font-size:12px;font-style:italic;text-align:center;padding:20px 0">No questions or blockers</div></div>';
    o += '</div>';
  }

  o += '<div class="card protocol-card">';
  o += '<div class="card-header"><span class="card-title">Communications Protocol</span></div>';
  o += '<div class="card-body protocol-body">';
  if (data.shared_contracts){
    o += renderFreeText(data.shared_contracts);
  } else {
    o += '<div style="color:var(--text3);font-size:12px;font-style:italic;text-align:center;padding:20px 0">No protocol defined</div>';
  }
  o += '</div></div>';

  o += '</div>';

  o += '<div class="section-label">Agents<span class="section-count">' + names.length + '</span></div>';
  o += '<div class="agent-grid">';

  sorted.forEach(function(name){
    var a = agents[name];
    var bossQs = extractBossQuestions(a);
    var hasBlocker = a.blockers && a.blockers.length > 0;
    var hasQuestion = bossQs.length > 0;

    var isDoneCard = (a.status === 'done');
    var isStaleCard = !isDoneCard && a.updated_at && (Date.now() - new Date(a.updated_at).getTime() > 600000);
    var cardCls = 'agent-card';
    if (isDoneCard) cardCls += ' is-done';
    else if (hasQuestion) cardCls += ' has-question';

    o += '<div class="' + cardCls + '">';
    o += '<div class="agent-head">';
    o += '<span class="agent-name">' + esc(name) + '</span>';
    o += '<div class="agent-badges">';

    var tmux = getTmuxStatus(name, tmuxData);
    var cardNeedsApproval = tmux && tmux.needs_approval;
    if (tmux && tmux.registered){
      if (tmux.exists){
        if (cardNeedsApproval) o += '<span class="tmux-badge tmux-waiting">waiting</span>';
        else if (tmux.idle) o += '<span class="tmux-badge tmux-idle">idle</span>';
        else o += '<span class="tmux-badge tmux-busy">busy</span>';
      } else {
        o += '<span class="tmux-badge tmux-offline">offline</span>';
      }
    }

    var cardStatus = a.status || 'idle';
    var statusCls = 'status-' + cardStatus;
    if (cardNeedsApproval) statusCls = 'status-blocked';
    else if (isStaleCard) statusCls = 'status-stale';
    else if (hasBlocker) statusCls = 'status-blocked';
    var cardStatusLabel = cardNeedsApproval ? 'waiting' : (isStaleCard ? 'stale' : (hasBlocker ? 'blocked' : cardStatus));
    o += '<span class="agent-status ' + statusCls + '">' + cardStatusLabel + '</span>';
    o += '</div></div>';

    var summary = (a.summary || '').replace(/^\[?\w+\]?\s*\d{4}-\d{2}-\d{2}\s*[—–\-]*\s*/, '').replace(/^\*\*/, '').replace(/\*\*$/, '');
    o += '<div class="agent-summary">' + esc(summary) + '</div>';
    o += '<div class="agent-body">';

    o += '<div class="agent-meta">';
    if (a.phase) o += '<span class="agent-phase">' + esc(a.phase) + '</span>';
    if (a.branch) o += '<span class="agent-branch">' + esc(a.branch) + '</span>';
    if (a.worktree) o += '<span class="agent-branch" style="background:rgba(92,101,120,.12);color:var(--text3);border-color:rgba(92,101,120,.2)">' + esc(a.worktree) + '</span>';
    if (a.pr){
      var cardPrUrl = buildMergeRequestUrl(a.repo_url, a.pr);
      if (cardPrUrl) o += '<a href="' + esc(cardPrUrl) + '" target="_blank" style="text-decoration:none"><span class="agent-branch" style="background:var(--blue-bg);color:var(--blue);border-color:rgba(77,158,255,.2)">' + esc(a.pr) + '</span></a>';
      else o += '<span class="agent-branch" style="background:var(--blue-bg);color:var(--blue);border-color:rgba(77,158,255,.2)">' + esc(a.pr) + '</span>';
    }
    if (a.test_count != null) o += '<span class="agent-test-count">' + a.test_count + ' tests</span>';
    o += '</div>';

    if (a.items && a.items.length > 0){
      o += '<ul class="agent-items">';
      a.items.forEach(function(it){ o += '<li>' + esc(it) + '</li>'; });
      o += '</ul>';
    }

    if (a.sections && a.sections.length > 0){
      a.sections.forEach(function(sec){
        o += '<div class="agent-section">';
        o += '<div class="agent-section-title">' + esc(sec.title || '') + '</div>';
        if (sec.items && sec.items.length > 0){
          o += '<ul class="agent-items">';
          sec.items.forEach(function(it){ o += '<li>' + esc(it) + '</li>'; });
          o += '</ul>';
        }
        o += '</div>';
      });
    }

    if (a.free_text){
      o += renderFreeText(a.free_text);
    }

    if (a.blockers && a.blockers.length > 0){
      a.blockers.forEach(function(bl){
        o += '<div class="agent-blocker">' + esc(bl) + '</div>';
      });
    }

    if (a.next_steps) o += '<div class="agent-next"><strong>Next </strong>' + esc(a.next_steps) + '</div>';

    bossQs.forEach(function(q){ o += '<div class="boss-q">' + esc(q) + '</div>'; });


    if (a.updated_at) o += '<div class="agent-updated">' + timeAgo(a.updated_at) + '</div>';

    o += '</div></div>';
  });

  o += '</div>';

  if (data.archive){
    o += '<div class="archive-card">';
    o += '<div class="archive-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">';
    o += '<span class="card-title">Archive &mdash; Completed Phases</span>';
    o += '<span style="color:var(--text3);font-size:12px">&#x25BC;</span>';
    o += '</div>';
    o += '<div class="archive-body">';
    o += esc(data.archive).replace(/\n/g, '<br>');
    o += '</div></div>';
  }

  document.getElementById('page').innerHTML = o;

  var dot = '<span class="header-dot" style="background:var(--green)"></span>';
  document.getElementById('agent-count').innerHTML = dot + names.length + ' agents';
  document.getElementById('last-update').textContent = 'Updated ' + new Date(data.updated_at).toLocaleString();
  renderBroadcastLog();
}

function renderFreeText(text){
  var lines = text.split('\n');
  var h = '<div class="agent-free-text">';
  var inCode = false, inTable = false, inList = false;
  for (var i = 0; i < lines.length; i++){
    var ln = lines[i];
    if (ln.indexOf('```') === 0){
      if (inList){ h += '</ul>'; inList = false; }
      if (inTable){ h += '</table>'; inTable = false; }
      if (inCode){ h += '</code></pre>'; inCode = false; }
      else { h += '<pre class="free-code"><code>'; inCode = true; }
      continue;
    }
    if (inCode){ h += esc(ln) + '\n'; continue; }
    if (/^\|.+\|$/.test(ln)){
      if (/^\|[\s\-:|]+\|$/.test(ln)) continue;
      if (!inTable){ if (inList){ h += '</ul>'; inList = false; } h += '<table class="free-table">'; inTable = true; }
      var cells = ln.split('|').filter(function(c,idx,arr){ return idx > 0 && idx < arr.length - 1; });
      h += '<tr>';
      cells.forEach(function(c){ h += '<td>' + esc(c.trim()).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>') + '</td>'; });
      h += '</tr>';
      continue;
    }
    if (inTable){ h += '</table>'; inTable = false; }
    if (/^#{1,4}\s/.test(ln)){
      if (inList){ h += '</ul>'; inList = false; }
      var lvl = ln.match(/^(#{1,4})/)[1].length;
      var title = ln.replace(/^#{1,4}\s+/, '').replace(/\*\*/g, '');
      h += '<div class="free-heading free-h' + lvl + '">' + esc(title) + '</div>';
      continue;
    }
    if (/^\s*[-*]\s/.test(ln) || /^\s*\d+\.\s/.test(ln)){
      if (!inList){ h += '<ul class="agent-items">'; inList = true; }
      var item = ln.replace(/^\s*[-*]\s+/, '').replace(/^\s*\d+\.\s+/, '');
      h += '<li>' + esc(item).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code class="free-inline-code">$1</code>') + '</li>';
      continue;
    }
    if (ln.trim() === ''){
      if (inList){ h += '</ul>'; inList = false; }
      continue;
    }
    if (inList){ h += '</ul>'; inList = false; }
    h += '<p class="free-para">' + esc(ln).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code class="free-inline-code">$1</code>') + '</p>';
  }
  if (inCode) h += '</code></pre>';
  if (inTable) h += '</table>';
  if (inList) h += '</ul>';
  h += '</div>';
  return h;
}
</script>
