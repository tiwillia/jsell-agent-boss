apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: ambient-credentials
objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ambient-credentials
      namespace: ${NAMESPACE}
    type: Opaque
    stringData:
      AMBIENT_TOKEN: ${AMBIENT_TOKEN}
parameters:
  - name: NAMESPACE
    required: true
    value: jsell-agent-boss
  - name: AMBIENT_TOKEN
    required: true
    description: Bearer token for the Ambient Code Platform public API
